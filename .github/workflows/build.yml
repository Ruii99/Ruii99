name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scheme:
        description: '选择打包架构 (rootless, roothide, rootful)'
        required: true
        default: 'rootless'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          rm -rf ~/theos
          git clone --depth 1 --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Install Dependencies
        run: |
          brew install ldid
          # 检查是否安装成功
          ldid -V || true

      - name: Build Package
        run: |
          chmod +x ~/theos/bin/*
          make clean
          make package SCHEME=${{ github.event.inputs.scheme || 'rootless' }} FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Deb-${{ github.event.inputs.scheme || 'rootless' }}
          path: packages/*.deb
