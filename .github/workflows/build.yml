name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scheme:
        description: '选择打包架构 (rootless, roothide, rootful)'
        required: true
        default: 'rootless'

jobs:
  build:
    runs-on: macos-latest  # 建议使用 macos 运行环境，编译 iOS 插件更稳定
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Package
        run: |
          # 清理并根据输入的参数进行编译
          make clean
          make package SCHEME=${{ github.event.inputs.scheme || 'rootless' }} FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4  # 已更新为 v4 版本
        with:
          name: Tweak-Deb-${{ github.event.inputs.scheme || 'rootless' }}
          path: packages/*.deb
