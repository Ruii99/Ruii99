name: Build Theos Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot git perl build-essential libzip-dev libplist-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -L https://github.com/theos/sdks/releases/download/2025.09/iPhoneOS17.0.sdk.tar.xz | tar -xJ -C ~/theos/sdks

      - name: Build Package
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Packages
          path: packages/*.deb